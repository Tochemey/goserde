name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: verify version and generated code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # The version goserdegen stamps into generated files is a source constant.
      # Fail the release if the pushed tag does not match it, so the tag and the
      # "Code generated by goserdegen <version>" header can never drift apart.
      - name: release tag matches goserdegen version
        run: |
          tag="${GITHUB_REF_NAME}"
          got="$(go run ./cmd/goserdegen -version)"
          if [ "$tag" != "$got" ]; then
            echo "::error::release tag '$tag' != goserdegen version '$got' — bump the version const in cmd/goserdegen/main.go, regenerate, and re-tag"
            exit 1
          fi
          echo "tag and generator version agree: $tag"
      # Guarantee the committed generated files actually carry that version.
      - name: generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code
