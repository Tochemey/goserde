name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Classify the diff. The heavy jobs below run only when code changed; on a
  # docs-only change they are skipped, which still reports each check as passing
  # so required status checks stay satisfied without running the full build.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'
              - 'codecov.yml'
              - '.github/workflows/**'

  build-test:
    name: build & test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test (race + coverage)
        run: go test -race -count=1 -covermode=atomic -coverpkg=./codec/...,./cmd/goserdegen/... -coverprofile=coverage.out ./...
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Tochemey/goserde
          files: ./coverage.out
      - name: generated code is up to date
        run: |
          go generate ./...
          git diff --exit-code

  fuzz-smoke:
    name: fuzz smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: fuzz round-trip (fast)
        run: go test ./cmd/goserdegen/ -run '^$' -fuzz '^FuzzRoundTrip$' -fuzztime 30s
      - name: fuzz decode (safe)
        run: go test ./cmd/goserdegen/ -run '^$' -fuzz '^FuzzAllDecode$' -fuzztime 30s

  lint:
    name: golangci-lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
