name: Feature request
description: Propose a new capability or an enhancement to an existing one.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please search existing issues and the [discussions](https://github.com/tochemey/goserde/discussions) first.

        Describing the problem you are trying to solve, not just the solution you have in mind, helps us find the best design. Keep in mind goserde's deliberate trade-off: maximum speed for trusted bytes, not a portable or self-describing format.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what makes it hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like goserde to do. Include the struct shape, directive, or API change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or rejected, including workarounds you use now.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where would this feature live?
      options:
        - Code generator (cmd/goserdegen)
        - Runtime primitives (runtime)
        - Convenience API (Bytes / Into / From)
        - Wire format
        - New field-type support
        - Documentation
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: compatibility
    attributes:
      label: Wire compatibility
      description: Would this change the bytes goserde produces for existing types?
      options:
        - No, it is backward compatible
        - Yes, it changes the wire format
        - Not sure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Prior art in other serializers (Protobuf, mus, benc, gencode, FlatBuffers, …), links, or constraints.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This fits goserde's trusted-bytes, speed-first scope (not a portable/self-describing format).
          required: false
        - label: I am willing to contribute this (or help with it).
          required: false
